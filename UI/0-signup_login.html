<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/Me/UI/styles/0-signup_login.css">
        <script src="https://kit.fontawesome.com/7adb9c0eec.js" crossorigin="anonymous"></script>
        <title>0-Signup/Login</title>
    </head>
    <body>
        <div class="container">
            <div class="form-box">
                <img src="\Me\UI\images\wethinkcode_logo.png" alt="WeThinkCode logo" class="logo">
                <h1>Welcome back!_</h1>
                <form>
                    <div class="input-group">

                        <div class="input-field">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Username">
                        </div>

                        <div class="input-field">
                            <i class="fa-solid fa-id-card"></i>
                            <input type="text" placeholder="ID Number">
                        </div>

                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Password">
                        </div>

                        <p>Lost password? <a href="#">Click here!</a></p>
                    </div>

                    <div class="button-field">
                        <button type="submit" class="btn btn-primary">Sign in</button>
                        <button type="button" class="btn btn-secondary">Admin</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
