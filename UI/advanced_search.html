<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/advanced_search.css">
        <title>Google Advanced Search</title>
    </head>
    <body>
        <header class="header">
            <div class="header-container">
                <img src="images/google_logo.png" alt="Google Logo" class="logo">
                <ul class="nav-links">
                    <li class="nav-item"><a href="index.html">Google Search</a></li>
                </ul>
            </div>
        </header>
        <div class="appbar">
            <label style="margin-left:10px">Advanced Search</label>
        </div>
        <div class="hr-line"></div>
        <div class="form-container">
            <form action="https://google.com/search">
                <div class="form-row">
                    <div class="text-container">
                        <div class="text-div">
                            <span>Find pages with...</span>
                        </div>
                    </div>
                    <div class="form-spacer"></div>
                </div>
            </form>
        </div>
    </body>
</html>
