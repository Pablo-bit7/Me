<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/Me/UI/styles/0-signup_login.css">
        <script src="https://kit.fontawesome.com/7adb9c0eec.js" crossorigin="anonymous"></script>
        <title>0-Signup/Login</title>
    </head>
    <body>
        <div class="container">
            <div class="form-box">
                <img src="\Me\UI\images\wethinkcode_logo.png" alt="WeThinkCode logo" class="logo">
                <h1>Welcome_</h1>
                <div class="input-group">

                    <div class="input-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Full Name">
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password">
                    </div>

                    <p class="terms">
                        By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                </div>
            </div>
        </div>
    </body>
</html>
