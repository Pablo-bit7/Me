<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZA Pharma Intel | Pilot Setup Guide</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg: #020617; /* Slate-950 */
            --accent: #3b82f6; /* Blue-500 */
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Smooth transitions for slide changes */
        .slide-container {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Animation for the first-time hint */
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        .animate-bounce-x { animation: bounce-x 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Minimal Icons
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/></svg>;

        const App = () => {
            const [current, setCurrent] = useState(0);
            const [showHint, setShowHint] = useState(true);

            const guide = [
                {
                    title: "Accessing Claude",
                    subtitle: "00 / Authentication",
                    img: "0.png",
                    instructions: "Navigate to claude.ai/login. Follow the prompts to either log in to your existing account or create a new one using your professional email or Google authentication."
                },
                {
                    title: "Customization",
                    subtitle: "01 / Sidebar",
                    img: "1.png",
                    instructions: "Locate the 'Customize' icon at the very bottom of the sidebar. This is your gateway to enabling the Signal Engine."
                },
                {
                    title: "Skills & Connectors",
                    subtitle: "02 / Preferences",
                    img: "2.png",
                    instructions: "Inside the Customize menu, switch to the 'Connectors' tab. This allows Claude to interface with external data protocols."
                },
                {
                    title: "Add Connector",
                    subtitle: "03 / Integration",
                    img: "3.png", 
                    instructions: "Click the plus (+) icon or 'Add Connector' and select 'Add custom connector' to begin the manual handshake."
                },
                {
                    title: "Endpoint Protocol",
                    subtitle: "04 / MCP Config",
                    img: "5.png",
                    instructions: "Input the following parameters precisely:\n\nName: ZA Pharma Intel (MCP)\nURL: https://za-pharma-intelligence.fastmcp.app/mcp"
                },
                {
                    title: "Capability Check",
                    subtitle: "05 / Tool Verification",
                    img: "6.png",
                    instructions: "Ensure the 4 core tools are active: Market Analysis (NDoH/Private), Company Intelligence, and SAHPRA Registry Search."
                },
                {
                    title: "Chat Ingress",
                    subtitle: "06 / Deployment",
                    img: "7.png",
                    instructions: "Return to your chat. Click the (+) icon in the message box to attach the active Signal Engine to your conversation."
                },
                {
                    title: "Final Activation",
                    subtitle: "07 / Pilot Live",
                    img: "8.png",
                    instructions: "Toggle the connector to 'Blue' (Enabled). Select 'Add from ZA Pharma Intel' to access the pre-baked prompt library for instant results."
                }
            ];

            const next = () => {
                setCurrent(s => (s + 1) % guide.length);
                setShowHint(false);
            };
            const prev = () => {
                setCurrent(s => (s - 1 + guide.length) % guide.length);
                setShowHint(false);
            };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowRight') next();
                    if (e.key === 'ArrowLeft') prev();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const slide = guide[current];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 sm:p-12">
                    
                    {/* Floating Navigation Hint */}
                    {showHint && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-white/5 border border-white/10 px-4 py-2 rounded-full backdrop-blur-md z-50">
                            <span className="text-[10px] font-bold uppercase tracking-widest text-blue-400 font-mono italic animate-bounce-x">Use Arrow Keys</span>
                        </div>
                    )}

                    <main className="w-full max-w-6xl aspect-[16/10] bg-[#020617] border border-white/10 rounded-[1.5rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col relative overflow-hidden">
                        
                        {/* Status Header */}
                        <div className="px-10 py-8 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <IconShield className="text-blue-500" />
                                <div className="h-4 w-px bg-white/10" />
                                <span className="text-[11px] font-mono font-bold tracking-[0.3em] uppercase text-white/40">Pilot Setup Guide</span>
                            </div>
                            <div className="text-[10px] font-mono text-blue-500/80 tracking-widest font-bold">
                                STEP {String(current + 1).padStart(2, '0')}
                            </div>
                        </div>

                        {/* Content Grid */}
                        <div key={current} className="flex-1 flex overflow-hidden slide-container">
                            
                            {/* Left: Copy */}
                            <div className="w-[38%] p-10 pt-4 flex flex-col justify-between border-r border-white/5">
                                <div className="space-y-8">
                                    <div className="space-y-3">
                                        <p className="text-[10px] font-mono font-bold text-blue-500 uppercase tracking-[0.4em]">{slide.subtitle}</p>
                                        <h2 className="text-4xl font-extrabold tracking-tighter text-white">
                                            {slide.title}
                                        </h2>
                                    </div>
                                    <div className="h-[2px] w-8 bg-blue-500" />
                                    <div className="max-h-[220px] overflow-y-auto custom-scrollbar">
                                        <p className="text-slate-400 text-[15px] leading-relaxed whitespace-pre-line font-medium pr-4">
                                            {slide.instructions}
                                        </p>
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={prev} className="p-4 bg-white/5 hover:bg-white/10 rounded-xl border border-white/5 text-slate-400 transition-all flex items-center justify-center">
                                        <IconArrowLeft />
                                    </button>
                                    <button onClick={next} className="flex-1 p-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                                        {current === guide.length - 1 ? "Complete" : "Next Step"} <IconArrowRight />
                                    </button>
                                </div>
                            </div>

                            {/* Right: Visual */}
                            <div className="flex-1 bg-black/40 p-12 flex items-center justify-center">
                                <div className="w-full h-full rounded-xl border border-white/5 bg-[#020617] relative shadow-2xl flex flex-col items-center justify-center overflow-hidden">
                                    {/* Blueprint Grid Overlay */}
                                    <div className="absolute inset-0 opacity-[0.03] pointer-events-none" 
                                         style={{ backgroundImage: 'radial-gradient(circle, #fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}>
                                    </div>
                                    
                                    {/* Asset Reference */}
                                    <div className="z-10 text-center">
                                        <p className="text-[10px] font-mono text-blue-500/30 uppercase tracking-[0.8em] mb-4">Reference Frame</p>
                                        <div className="text-8xl font-black text-white/[0.03] italic uppercase select-none leading-none tracking-tighter">
                                            {slide.img}
                                        </div>
                                    </div>
                                    
                                    {/* Local Image Component (Ready for live assets) */}
                                    {/* <img src={slide.img} className="absolute inset-0 w-full h-full object-contain p-6" alt={slide.title} /> */}
                                </div>
                            </div>
                        </div>

                        {/* Progress Bar */}
                        <div className="h-[2px] w-full bg-white/5">
                            <div 
                                className="h-full bg-blue-600 transition-all duration-500 ease-out" 
                                style={{ width: `${((current + 1) / guide.length) * 100}%` }}
                            />
                        </div>
                    </main>

                    {/* Minimal Footer */}
                    <footer className="mt-12 w-full max-w-6xl flex justify-between items-center text-[10px] font-mono font-bold text-slate-600 tracking-[0.3em] uppercase">
                        <div className="flex gap-8">
                            <span>ZA Pharma Intelligence</span>
                            <span>Pilot Env v1.0.4</span>
                        </div>
                        <div className="flex items-center gap-2 text-slate-500">
                            <span className="w-1 h-1 bg-green-500 rounded-full animate-pulse" />
                            Use Arrow Keys to Navigate Guide
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
