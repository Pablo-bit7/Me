<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/advanced_search.css">
        <title>Google Advanced Search</title>
    </head>
    <body>
        <header class="header">
            <div class="header-container">
                <img src="images/google_logo.png" alt="Google Logo" class="logo">
                <ul class="nav-links">
                    <li class="nav-item"><a href="google_search.html">Google Search</a></li>
                </ul>
            </div>
        </header>
        <div class="appbar">
            <label style="margin-left:10px">Advanced Search</label>
        </div>
        <div class="hr-line"></div>
        <div class="form-container">
            <form action="https://google.com/search">
                <div class="form-row">
                    <div class="text-container-left">
                        <div class="form-header-text-div">
                            <span>Find pages with...</span>
                        </div>
                    </div>
                    <div class="form-spacer"></div>
                    <div class="text-container-right">
                        <div class="explainer-header-text-div">To do this in the search box.</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="text-container-left">
                        <div class="text-div-left">
                            <label>all these words:</label>
                        </div>
                    </div>
                    <div class="form-spacer">
                        <div class="input-field">
                            <input type="text" name="as_q">
                        </div>
                    </div>
                    <div class="text-container-right">
                        <div class="explainer-text-div">
                            Type the important words: 
                            <span class="example-text">tri-colour rat terrier</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="text-container-left">
                        <div class="text-div-left">
                            <label>this exact word or phrase:</label>
                        </div>
                    </div>
                    <div class="form-spacer">
                        <div class="input-field">
                            <input type="text" name="as_epq">
                        </div>
                    </div>
                    <div class="text-container-right">
                        <div class="explainer-text-div">
                            Put exact words in quotes: 
                            <span class="example-text">"rat terrier"</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="text-container-left">
                        <div class="text-div-left">
                            <label>any of these words:</label>
                        </div>
                    </div>
                    <div class="form-spacer">
                        <div class="input-field">
                            <input type="text" name="as_oq">
                        </div>
                    </div>
                    <div class="text-container-right">
                        <div class="explainer-text-div">
                            Type 
                            <span class="example-text">OR</span>
                            between all the words you want:
                            <span class="example-text">miniature OR standard</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="text-container-left">
                        <div class="text-div-left">
                            <label>none of these words:</label>
                        </div>
                    </div>
                    <div class="form-spacer">
                        <div class="input-field">
                            <input type="text" name="as_eq">
                        </div>
                    </div>
                    <div class="text-container-right">
                        <div class="explainer-text-div">
                            Put a minus sign just before words that you don't want: 
                            <span class="example-text">-rodent, -"Jack Russell"</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="text-container-left"></div>
                    <div class="btn-field-spacer">
                        <input class="btn" type="submit" value="Advanced Search">
                    </div>
                    <div class="text-container-right"></div>
                </div>
                <div class="form-hr-line"></div>
            </form>
        </div>
    </body>
</html>
