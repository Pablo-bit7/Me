<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/google_search.css">
        <script src="https://kit.fontawesome.com/7adb9c0eec.js" crossorigin="anonymous"></script>
        <title>Google</title>
    </head>
    <body>
        <div>
            <ul class="nav-links">
                <li class="nav-item"><a href="search_images.html">Images</a></li>
                <li class="nav-item"><a href="advanced_search.html">Advanced Search</a></li>
            </ul>
        </div>
        <div class="centre-div">
            <img src="images/google_logo.png" alt="Google Logo" class="logo">
        </div>
        <form action="https://www.google.com/search">
            <div class="input-field">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" name="q">
                <i class="fa-solid fa-microphone"></i>
                <i class="fa-solid fa-camera"></i>
            </div>
            <div class="centre-div">
                <input type="submit" value="Google Search" class="search-btn">
                <input type="submit" value="I'm Feeling Lucky" name="btnI" class="search-btn">
            </div>
        </form>
    </body>
</html>
